<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RadrView</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1a1a2e; }
    #map { width: 100vw; height: 100vh; }
    .controls {
      position: absolute;
      top: 12px;
      right: 12px;
      z-index: 1000;
      background: rgba(26, 26, 46, 0.92);
      border-radius: 10px;
      padding: 14px 16px;
      color: #e0e0e0;
      font-size: 13px;
      min-width: 200px;
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 4px 24px rgba(0,0,0,0.4);
    }
    .controls h3 {
      margin: 0 0 10px 0;
      font-size: 15px;
      font-weight: 600;
      color: #fff;
      letter-spacing: 0.5px;
    }
    .controls label {
      display: block;
      margin: 8px 0 4px;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: #888;
    }
    .controls select {
      width: 100%;
      padding: 6px 8px;
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.06);
      color: #e0e0e0;
      font-size: 13px;
      cursor: pointer;
    }
    .controls select:focus { outline: none; border-color: rgba(100, 200, 255, 0.4); }
    .status {
      margin-top: 12px;
      padding-top: 10px;
      border-top: 1px solid rgba(255,255,255,0.08);
      font-size: 11px;
      color: #888;
      line-height: 1.6;
    }
    .status .value { color: #aee; }
    .legend-img {
      margin-top: 10px;
      display: block;
      height: 180px;
      width: 24px;
      border-radius: 4px;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .legend-labels {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      height: 180px;
      font-size: 10px;
      color: #888;
      padding: 2px 0;
    }
    .legend-row {
      display: flex;
      gap: 6px;
      align-items: stretch;
      margin-top: 8px;
    }
    .playback { margin-top: 12px; padding-top: 10px; border-top: 1px solid rgba(255,255,255,0.08); }
    .playback label { display: block; margin-bottom: 6px; font-size: 11px; text-transform: uppercase; letter-spacing: 0.8px; color: #888; }
    .playback-controls { display: flex; align-items: center; gap: 8px; }
    .playback-controls button { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15); color: #fff; border-radius: 6px; width: 32px; height: 28px; cursor: pointer; font-size: 12px; }
    .playback-controls button:hover { background: rgba(255,255,255,0.2); }
    .playback-controls input[type=range] { flex: 1; }
  </style>
</head>
<body>
  <div id="map"></div>
  <div class="controls">
    <h3>RadrView</h3>

    <label>Palette</label>
    <select id="palette"></select>

    <label>Source</label>
    <select id="source">
      <option value="composite" selected>Composite (All)</option>
    </select>

    <label>Opacity</label>
    <input type="range" id="opacity" min="0" max="100" value="70" style="width:100%">

    <div class="legend-row">
      <img id="legend" class="legend-img" />
      <div class="legend-labels">
        <span>70+ dBZ</span>
        <span>50</span>
        <span>35</span>
        <span>20</span>
        <span>5</span>
      </div>
    </div>

    <div class="status">
      <div>Live: <span class="value" id="ws-status" style="color:#f44">disconnected</span></div>
      <div>Frame: <span class="value" id="frame-ts">--</span></div>
      <div>Age: <span class="value" id="frame-age">--</span></div>
      <div>Tiles: <span class="value" id="tile-count">--</span></div>
    </div>

    <div class="playback">
      <label>Animation</label>
      <div class="playback-controls">
        <button id="play-btn" title="Play/Pause">&#9654;</button>
        <input type="range" id="timeline" min="0" max="0" value="0" style="flex:1">
        <span id="frame-time" style="font-size:11px;color:#aee;min-width:50px">--:--</span>
      </div>
      <div style="display:flex;justify-content:space-between;font-size:10px;color:#666;margin-top:2px">
        <span id="timeline-start">--</span>
        <span>Speed: <select id="play-speed" style="background:rgba(255,255,255,0.06);color:#e0e0e0;border:1px solid rgba(255,255,255,0.12);border-radius:4px;font-size:10px">
          <option value="500">Fast</option>
          <option value="1000" selected>Normal</option>
          <option value="2000">Slow</option>
        </select></span>
        <span id="timeline-end">--</span>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const API = window.location.origin;
    let radarLayer = null;
    let currentFrame = null;
    let frames = [];
    let playing = false;
    let playInterval = null;
    let liveMode = true;

    function formatAge(seconds) {
      if (seconds < 60) return seconds + 's';
      if (seconds < 3600) return Math.floor(seconds / 60) + 'm ' + (seconds % 60) + 's';
      if (seconds < 86400) return Math.floor(seconds / 3600) + 'h ' + Math.floor((seconds % 3600) / 60) + 'm';
      return Math.floor(seconds / 86400) + 'd ' + Math.floor((seconds % 86400) / 3600) + 'h';
    }

    // Init map centered on North America
    const map = L.map('map', { zoomControl: false }).setView([42, -95], 5);
    L.control.zoom({ position: 'bottomleft' }).addTo(map);

    // Dark basemap
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
      attribution: '&copy; OpenStreetMap &copy; CARTO',
      subdomains: 'abcd',
      maxZoom: 19,
    }).addTo(map);

    // Load palettes
    async function loadPalettes() {
      const res = await fetch(`${API}/palettes`);
      const data = await res.json();
      const sel = document.getElementById('palette');
      data.palettes.forEach(p => {
        const opt = document.createElement('option');
        opt.value = p.name;
        opt.textContent = p.name.charAt(0).toUpperCase() + p.name.slice(1) + ' — ' + p.description;
        if (p.name === 'dark') opt.selected = true;
        sel.appendChild(opt);
      });
      updateLegend();
    }

    function updateLegend() {
      const palette = document.getElementById('palette').value;
      document.getElementById('legend').src = `${API}/palette/${palette}/legend`;
    }

    // Dual-layer crossfade system with preloading
    let frontLayer = null;
    let backLayer = null;
    let preloadedFrame = null;
    let fadeAnim = null;
    const FADE_DURATION = 400; // ms

    function makeLayer(timestamp) {
      const palette = document.getElementById('palette').value;
      const source = document.getElementById('source').value;
      return L.tileLayer(`${API}/tile/${timestamp}/{z}/{x}/{y}?palette=${palette}&source=${source}`, {
        opacity: 0,
        maxNativeZoom: 12,
        maxZoom: 18,
        minZoom: 2,
        tileSize: 256,
        attribution: 'RadrView',
      });
    }

    function addRadarLayer() {
      if (!currentFrame) return;
      const targetOpacity = document.getElementById('opacity').value / 100;

      // Cancel any in-progress fade
      if (fadeAnim) { cancelAnimationFrame(fadeAnim); fadeAnim = null; }

      // If we preloaded this frame, crossfade from front → back
      if (backLayer && preloadedFrame === currentFrame) {
        const oldFront = frontLayer;
        const newFront = backLayer;
        backLayer = null;
        preloadedFrame = null;
        frontLayer = newFront;
        radarLayer = newFront;

        // Smooth crossfade using requestAnimationFrame
        const startTime = performance.now();
        function animate(now) {
          const t = Math.min((now - startTime) / FADE_DURATION, 1);
          // Ease in-out cubic
          const ease = t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;

          newFront.setOpacity(ease * targetOpacity);
          if (oldFront) oldFront.setOpacity((1 - ease) * targetOpacity);

          if (t < 1) {
            fadeAnim = requestAnimationFrame(animate);
          } else {
            // Fade complete — remove old layer
            if (oldFront) map.removeLayer(oldFront);
            fadeAnim = null;
          }
        }
        fadeAnim = requestAnimationFrame(animate);
        return;
      }

      // No preload — hard swap (first frame or palette/source change)
      const newLayer = makeLayer(currentFrame);
      newLayer.setOpacity(targetOpacity);
      newLayer.addTo(map);
      if (frontLayer) map.removeLayer(frontLayer);
      frontLayer = newLayer;
      radarLayer = newLayer;
    }

    function preloadFrame(timestamp) {
      if (!timestamp || timestamp === preloadedFrame) return;

      // Remove old preload
      if (backLayer) { map.removeLayer(backLayer); backLayer = null; }

      backLayer = makeLayer(timestamp);
      backLayer.addTo(map); // Added at opacity 0 — tiles load invisibly
      preloadedFrame = timestamp;
    }

    async function fetchLatestFrame() {
      const source = document.getElementById('source').value;
      try {
        const res = await fetch(`${API}/frames/latest?source=${source}`);
        if (!res.ok) return;
        const data = await res.json();
        const changed = currentFrame !== data.timestamp;
        currentFrame = data.timestamp;
        document.getElementById('frame-ts').textContent = data.timestamp;
        document.getElementById('frame-age').textContent = formatAge(data.age);
        // Fetch frame count
        fetch(`${API}/frames?source=${source}&limit=1000`).then(r=>r.json()).then(d=>{
          document.getElementById('tile-count').textContent = d.count + ' frames';
        }).catch(()=>{});
        if (changed) addRadarLayer();
      } catch (e) {
        document.getElementById('frame-ts').textContent = 'error';
      }
    }

    // Event listeners
    document.getElementById('palette').addEventListener('change', () => {
      updateLegend();
      addRadarLayer();
    });
    document.getElementById('source').addEventListener('change', () => {
      stopPlayback();
      liveMode = true;
      fetchLatestFrame();
      loadFrames();
    });
    document.getElementById('opacity').addEventListener('input', () => {
      if (radarLayer) radarLayer.setOpacity(document.getElementById('opacity').value / 100);
    });

    // WebSocket for real-time frame updates
    const wsStatus = document.getElementById('ws-status');
    function connectWebSocket() {
      const wsProtocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
      const ws = new WebSocket(`${wsProtocol}//${window.location.host}/ws`);

      ws.onopen = () => {
        wsStatus.textContent = 'connected';
        wsStatus.style.color = '#4f4';
      };

      ws.onmessage = (event) => {
        const msg = JSON.parse(event.data);
        if (msg.type === 'new-frame') {
          currentFrame = msg.timestamp;
          document.getElementById('frame-ts').textContent = msg.timestamp;
          document.getElementById('frame-age').textContent = formatAge(0);
          // Flash the status to show a live update arrived
          wsStatus.textContent = 'new frame!';
          wsStatus.style.color = '#ff0';
          setTimeout(() => {
            wsStatus.textContent = 'connected';
            wsStatus.style.color = '#4f4';
          }, 2000);
          addRadarLayer();
          if (liveMode) {
            loadFrames(); // Refresh frame list
          }
        }
      };

      ws.onclose = () => {
        wsStatus.textContent = 'reconnecting...';
        wsStatus.style.color = '#f44';
        setTimeout(connectWebSocket, 5000);
      };

      ws.onerror = () => ws.close();
    }

    // Load sources dynamically
    async function loadSources() {
      const res = await fetch(`${API}/sources`);
      const data = await res.json();
      const sel = document.getElementById('source');
      data.sources.forEach(s => {
        if (s.name === 'composite') return; // already in HTML
        const opt = document.createElement('option');
        opt.value = s.name;
        opt.textContent = s.name.toUpperCase() + ' — ' + s.description;
        sel.appendChild(opt);
      });
    }

    // Animation / Time Machine
    async function loadFrames() {
      const source = document.getElementById('source').value;
      const res = await fetch(`${API}/frames?source=${source}&limit=720`);
      const data = await res.json();
      frames = data.frames;
      const timeline = document.getElementById('timeline');
      timeline.max = Math.max(0, frames.length - 1);
      timeline.value = frames.length - 1;
      if (frames.length > 0) {
        document.getElementById('timeline-start').textContent = formatFrameTime(frames[0].timestamp);
        document.getElementById('timeline-end').textContent = formatFrameTime(frames[frames.length - 1].timestamp);
      }
    }

    function formatFrameTime(ts) {
      // YYYYMMDDHHMMSS -> HH:MM
      return ts.slice(8, 10) + ':' + ts.slice(10, 12);
    }

    document.getElementById('play-btn').addEventListener('click', () => {
      if (playing) {
        stopPlayback();
      } else {
        startPlayback();
      }
    });

    document.getElementById('play-btn').addEventListener('dblclick', () => {
      stopPlayback();
      liveMode = true;
      const timeline = document.getElementById('timeline');
      timeline.value = frames.length - 1;
      fetchLatestFrame();
    });

    function startPlayback() {
      playing = true;
      liveMode = false;
      document.getElementById('play-btn').textContent = '\u23F8';
      const speed = parseInt(document.getElementById('play-speed').value);

      // Preload the first next frame immediately
      const timeline = document.getElementById('timeline');
      const nextIdx = (parseInt(timeline.value) + 1) % frames.length;
      if (frames[nextIdx]) preloadFrame(frames[nextIdx].timestamp);

      playInterval = setInterval(() => {
        let idx = parseInt(timeline.value) + 1;
        if (idx >= frames.length) idx = 0;
        timeline.value = idx;
        showFrame(idx);

        // Preload the NEXT frame while this one is showing
        const peekIdx = (idx + 1) % frames.length;
        if (frames[peekIdx]) preloadFrame(frames[peekIdx].timestamp);
      }, speed);
    }

    function stopPlayback() {
      playing = false;
      document.getElementById('play-btn').textContent = '\u25B6';
      if (playInterval) { clearInterval(playInterval); playInterval = null; }
    }

    document.getElementById('timeline').addEventListener('input', (e) => {
      liveMode = false;
      stopPlayback();
      showFrame(parseInt(e.target.value));
    });

    function showFrame(idx) {
      if (idx < 0 || idx >= frames.length) return;
      const frame = frames[idx];
      currentFrame = frame.timestamp;
      document.getElementById('frame-ts').textContent = frame.timestamp;
      document.getElementById('frame-time').textContent = formatFrameTime(frame.timestamp);
      const age = Math.floor((Date.now() - frame.epochMs) / 1000);
      document.getElementById('frame-age').textContent = formatAge(age);
      addRadarLayer();
    }

    // Init
    loadSources();
    loadPalettes();
    fetchLatestFrame();
    loadFrames();
    connectWebSocket();
    // Fallback polling in case WebSocket disconnects
    setInterval(fetchLatestFrame, 60000);
  </script>
</body>
</html>
