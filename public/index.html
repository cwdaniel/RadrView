<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>RadrView</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1a1a2e; overflow: hidden; }
    #map { width: 100vw; height: calc(100vh - 42px); margin-top: 42px; }

    /* Panel — desktop: top-right card, mobile: bottom sheet */
    .panel {
      position: absolute;
      z-index: 1000;
      background: rgba(20, 20, 36, 0.95);
      color: #e0e0e0;
      font-size: 13px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 4px 30px rgba(0,0,0,0.5);
      transition: transform 0.3s ease;
    }

    /* Desktop layout */
    @media (min-width: 641px) {
      .panel {
        top: 54px; right: 12px;
        border-radius: 12px;
        padding: 14px 16px;
        min-width: 220px;
        max-width: 260px;
        max-height: calc(100vh - 24px);
        overflow-y: auto;
      }
      .panel-handle { display: none; }
      .panel.collapsed .panel-body { display: none; }
    }

    /* Mobile layout — bottom sheet */
    @media (max-width: 640px) {
      .panel {
        bottom: 0; left: 0; right: 0;
        border-radius: 16px 16px 0 0;
        padding: 0 16px 16px;
        max-height: 70vh;
        overflow-y: auto;
        transform: translateY(calc(100% - 90px));
      }
      .panel.open { transform: translateY(0); }
      .panel-handle {
        display: flex;
        justify-content: center;
        padding: 10px 0 6px;
        cursor: pointer;
      }
      .panel-handle::after {
        content: '';
        width: 36px; height: 4px;
        background: rgba(255,255,255,0.25);
        border-radius: 2px;
      }
      .panel h3 { font-size: 14px; }
      .panel select, .panel button { font-size: 14px; min-height: 36px; }
    }

    .panel h3 {
      margin: 0 0 8px;
      font-size: 15px;
      font-weight: 600;
      color: #fff;
      letter-spacing: 0.5px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .panel h3 .live-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #f44;
      display: inline-block;
    }
    .panel h3 .live-dot.connected { background: #4f4; }

    .panel label {
      display: block;
      margin: 8px 0 4px;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: #666;
    }
    .panel select {
      width: 100%;
      padding: 6px 8px;
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.06);
      color: #e0e0e0;
      font-size: 13px;
      cursor: pointer;
      -webkit-appearance: none;
    }
    .panel select:focus { outline: none; border-color: rgba(100, 200, 255, 0.4); }

    .row { display: flex; gap: 8px; align-items: center; }
    .row > * { flex: 1; }

    .status-bar {
      display: flex;
      justify-content: space-between;
      font-size: 10px;
      color: #666;
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid rgba(255,255,255,0.06);
    }
    .status-bar .val { color: #9cf; }

    .legend-row {
      display: flex;
      gap: 6px;
      align-items: stretch;
      margin-top: 8px;
    }
    .legend-img {
      display: block;
      height: 120px;
      width: 20px;
      border-radius: 4px;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .legend-labels {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      height: 120px;
      font-size: 9px;
      color: #666;
    }

    .playback { margin-top: 8px; padding-top: 8px; border-top: 1px solid rgba(255,255,255,0.06); }
    .playback-controls { display: flex; align-items: center; gap: 6px; }
    .playback-controls button {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.15);
      color: #fff;
      border-radius: 6px;
      width: 36px; height: 32px;
      cursor: pointer;
      font-size: 14px;
      flex-shrink: 0;
    }
    .playback-controls button:active { background: rgba(255,255,255,0.25); }
    .playback-controls input[type=range] { flex: 1; min-width: 0; }
    .playback-meta {
      display: flex;
      justify-content: space-between;
      font-size: 9px;
      color: #555;
      margin-top: 2px;
    }
    /* Top navbar */
    .navbar {
      position: absolute;
      top: 0; left: 0; right: 0;
      z-index: 1001;
      height: 42px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 12px;
      background: rgba(16, 16, 30, 0.88);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .navbar-brand {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-decoration: none;
    }
    .navbar-brand .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #f44;
    }
    .navbar-brand .dot.connected { background: #4f4; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
    .navbar-links {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .navbar-links a {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 5px 10px;
      border-radius: 6px;
      font-size: 12px;
      text-decoration: none;
      color: #999;
      transition: color 0.15s, background 0.15s;
    }
    .navbar-links a:hover { color: #fff; background: rgba(255,255,255,0.08); }
    .navbar-links svg { width: 16px; height: 16px; fill: currentColor; }
    @media (max-width: 640px) {
      .navbar-links span { display: none; }
      .navbar-links a { padding: 6px; }
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <a href="/" class="navbar-brand">
      <span class="dot" id="live-dot" title="disconnected"></span>
      RadrView
    </a>
    <div class="navbar-links">
      <a href="/docs">Docs</a>
      <a href="https://github.com/cwdaniel/radrview" target="_blank" rel="noopener">
        <svg viewBox="0 0 16 16" style="width:16px;height:16px;fill:currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
        <span>GitHub</span>
      </a>
    </div>
  </nav>

  <div id="map"></div>

  <div class="panel" id="panel">
    <div class="panel-handle" id="panel-handle"></div>

    <h3>Controls</h3>

    <div class="panel-body">
      <div class="row">
        <div>
          <label>Palette</label>
          <select id="palette"></select>
        </div>
        <div>
          <label>Source</label>
          <select id="source">
            <option value="composite" selected>Global</option>
          </select>
        </div>
      </div>

      <label>Opacity</label>
      <input type="range" id="opacity" min="0" max="100" value="70" style="width:100%">

      <div class="legend-row">
        <img id="legend" class="legend-img" />
        <div class="legend-labels">
          <span>70+</span>
          <span>50</span>
          <span>35</span>
          <span>20</span>
          <span>5 dBZ</span>
        </div>
      </div>

      <div class="status-bar">
        <span>Frame: <span class="val" id="frame-ts">--</span></span>
        <span>Age: <span class="val" id="frame-age">--</span></span>
        <span><span class="val" id="tile-count">--</span></span>
      </div>

      <div class="playback">
        <div class="playback-controls">
          <button id="play-btn" title="Play/Pause">&#9654;</button>
          <input type="range" id="timeline" min="0" max="0" value="0">
          <span style="font-size:11px;color:#9cf;min-width:40px;text-align:right" id="frame-time">--:--</span>
        </div>
        <div class="playback-meta">
          <span id="timeline-start">--</span>
          <span>
            <select id="play-speed" style="background:rgba(255,255,255,0.06);color:#ccc;border:1px solid rgba(255,255,255,0.1);border-radius:4px;font-size:9px;padding:1px 4px">
              <option value="500">Fast</option>
              <option value="1000" selected>Normal</option>
              <option value="2000">Slow</option>
            </select>
          </span>
          <span id="timeline-end">--</span>
        </div>
      </div>

    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const API = window.location.origin;
    let radarLayer = null;
    let currentFrame = null;
    let frames = [];
    let playing = false;
    let playInterval = null;
    let liveMode = true;

    // Mobile panel toggle
    const panel = document.getElementById('panel');
    document.getElementById('panel-handle').addEventListener('click', () => {
      panel.classList.toggle('open');
    });

    function formatAge(seconds) {
      if (seconds < 60) return seconds + 's';
      if (seconds < 3600) return Math.floor(seconds / 60) + 'm ' + (seconds % 60) + 's';
      if (seconds < 86400) return Math.floor(seconds / 3600) + 'h ' + Math.floor((seconds % 3600) / 60) + 'm';
      return Math.floor(seconds / 86400) + 'd ' + Math.floor((seconds % 86400) / 3600) + 'h';
    }

    const map = L.map('map', { zoomControl: false }).setView([42, -95], 5);
    L.control.zoom({ position: 'bottomleft' }).addTo(map);

    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
      attribution: '&copy; OSM &copy; CARTO',
      subdomains: 'abcd',
      maxZoom: 19,
    }).addTo(map);

    async function loadPalettes() {
      const res = await fetch(`${API}/palettes`);
      const data = await res.json();
      const sel = document.getElementById('palette');
      data.palettes.forEach(p => {
        const opt = document.createElement('option');
        opt.value = p.name;
        opt.textContent = p.name.charAt(0).toUpperCase() + p.name.slice(1);
        if (p.name === 'dark') opt.selected = true;
        sel.appendChild(opt);
      });
      updateLegend();
    }

    function updateLegend() {
      document.getElementById('legend').src = `${API}/palette/${document.getElementById('palette').value}/legend`;
    }

    // Dual-layer preload + crossfade
    let frontLayer = null;
    let backLayer = null;
    let preloadedFrame = null;
    let fadeAnim = null;
    const FADE_DURATION = 400;

    function makeLayer(timestamp) {
      const palette = document.getElementById('palette').value;
      const source = document.getElementById('source').value;
      return L.tileLayer(`${API}/tile/${timestamp}/{z}/{x}/{y}?palette=${palette}&source=${source}`, {
        opacity: 0,
        maxNativeZoom: 12,
        maxZoom: 18,
        minZoom: 2,
        tileSize: 256,
        attribution: 'RadrView',
      });
    }

    function addRadarLayer() {
      if (!currentFrame) return;
      const targetOpacity = document.getElementById('opacity').value / 100;

      if (fadeAnim) { cancelAnimationFrame(fadeAnim); fadeAnim = null; }

      if (backLayer && preloadedFrame === currentFrame) {
        const oldFront = frontLayer;
        const newFront = backLayer;
        backLayer = null;
        preloadedFrame = null;
        frontLayer = newFront;
        radarLayer = newFront;

        const startTime = performance.now();
        function animate(now) {
          const t = Math.min((now - startTime) / FADE_DURATION, 1);
          const ease = t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2, 3)/2;
          newFront.setOpacity(ease * targetOpacity);
          if (oldFront) oldFront.setOpacity((1 - ease) * targetOpacity);
          if (t < 1) {
            fadeAnim = requestAnimationFrame(animate);
          } else {
            if (oldFront) map.removeLayer(oldFront);
            fadeAnim = null;
          }
        }
        fadeAnim = requestAnimationFrame(animate);
        return;
      }

      const newLayer = makeLayer(currentFrame);
      newLayer.setOpacity(targetOpacity);
      newLayer.addTo(map);
      if (frontLayer) map.removeLayer(frontLayer);
      frontLayer = newLayer;
      radarLayer = newLayer;
    }

    function preloadFrame(timestamp) {
      if (!timestamp || timestamp === preloadedFrame) return;
      if (backLayer) { map.removeLayer(backLayer); backLayer = null; }
      backLayer = makeLayer(timestamp);
      backLayer.addTo(map);
      preloadedFrame = timestamp;
    }

    async function fetchLatestFrame() {
      const source = document.getElementById('source').value;
      try {
        const res = await fetch(`${API}/frames/latest?source=${source}`);
        if (!res.ok) return;
        const data = await res.json();
        const changed = currentFrame !== data.timestamp;
        currentFrame = data.timestamp;
        document.getElementById('frame-ts').textContent = data.timestamp.slice(8,10)+':'+data.timestamp.slice(10,12);
        document.getElementById('frame-age').textContent = formatAge(data.age);
        fetch(`${API}/frames?source=${source}&limit=1000`).then(r=>r.json()).then(d=>{
          document.getElementById('tile-count').textContent = d.count + ' frames';
        }).catch(()=>{});
        if (changed) addRadarLayer();
      } catch (e) {
        document.getElementById('frame-ts').textContent = 'err';
      }
    }

    document.getElementById('palette').addEventListener('change', () => { updateLegend(); addRadarLayer(); });
    document.getElementById('source').addEventListener('change', () => { stopPlayback(); liveMode = true; fetchLatestFrame(); loadFrames(); });
    document.getElementById('opacity').addEventListener('input', () => {
      if (radarLayer) radarLayer.setOpacity(document.getElementById('opacity').value / 100);
    });

    // WebSocket
    const liveDot = document.getElementById('live-dot');
    function connectWebSocket() {
      const wsProto = location.protocol === 'https:' ? 'wss:' : 'ws:';
      const ws = new WebSocket(`${wsProto}//${location.host}/ws`);
      ws.onopen = () => { liveDot.classList.add('connected'); liveDot.title = 'connected'; };
      ws.onmessage = (event) => {
        const msg = JSON.parse(event.data);
        if (msg.type === 'new-frame' && liveMode) {
          currentFrame = msg.timestamp;
          document.getElementById('frame-ts').textContent = msg.timestamp.slice(8,10)+':'+msg.timestamp.slice(10,12);
          document.getElementById('frame-age').textContent = formatAge(0);
          addRadarLayer();
          loadFrames();
        }
      };
      ws.onclose = () => { liveDot.classList.remove('connected'); liveDot.title = 'disconnected'; setTimeout(connectWebSocket, 5000); };
      ws.onerror = () => ws.close();
    }

    // Sources
    async function loadSources() {
      const res = await fetch(`${API}/sources`);
      const data = await res.json();
      const sel = document.getElementById('source');
      data.sources.forEach(s => {
        if (s.name === 'composite') return;
        const opt = document.createElement('option');
        opt.value = s.name;
        opt.textContent = s.description || s.name;
        sel.appendChild(opt);
      });
    }

    // Animation
    async function loadFrames() {
      const source = document.getElementById('source').value;
      const res = await fetch(`${API}/frames?source=${source}&limit=720`);
      const data = await res.json();
      frames = data.frames;
      const tl = document.getElementById('timeline');
      tl.max = Math.max(0, frames.length - 1);
      tl.value = frames.length - 1;
      if (frames.length > 0) {
        document.getElementById('timeline-start').textContent = formatFrameTime(frames[0].timestamp);
        document.getElementById('timeline-end').textContent = formatFrameTime(frames[frames.length - 1].timestamp);
      }
    }

    function formatFrameTime(ts) { return ts.slice(8,10) + ':' + ts.slice(10,12); }

    document.getElementById('play-btn').addEventListener('click', () => { playing ? stopPlayback() : startPlayback(); });
    document.getElementById('play-btn').addEventListener('dblclick', () => { stopPlayback(); liveMode = true; document.getElementById('timeline').value = frames.length - 1; fetchLatestFrame(); });

    function startPlayback() {
      playing = true; liveMode = false;
      document.getElementById('play-btn').textContent = '\u23F8';
      const speed = parseInt(document.getElementById('play-speed').value);
      const tl = document.getElementById('timeline');
      const nextIdx = (parseInt(tl.value) + 1) % frames.length;
      if (frames[nextIdx]) preloadFrame(frames[nextIdx].timestamp);
      playInterval = setInterval(() => {
        let idx = parseInt(tl.value) + 1;
        if (idx >= frames.length) idx = 0;
        tl.value = idx;
        showFrame(idx);
        const peekIdx = (idx + 1) % frames.length;
        if (frames[peekIdx]) preloadFrame(frames[peekIdx].timestamp);
      }, speed);
    }

    function stopPlayback() {
      playing = false;
      document.getElementById('play-btn').textContent = '\u25B6';
      if (playInterval) { clearInterval(playInterval); playInterval = null; }
    }

    document.getElementById('timeline').addEventListener('input', (e) => { liveMode = false; stopPlayback(); showFrame(parseInt(e.target.value)); });

    function showFrame(idx) {
      if (idx < 0 || idx >= frames.length) return;
      const frame = frames[idx];
      currentFrame = frame.timestamp;
      document.getElementById('frame-ts').textContent = formatFrameTime(frame.timestamp);
      document.getElementById('frame-time').textContent = formatFrameTime(frame.timestamp);
      document.getElementById('frame-age').textContent = formatAge(Math.floor((Date.now() - frame.epochMs) / 1000));
      addRadarLayer();
    }

    // Init
    loadSources();
    loadPalettes();
    fetchLatestFrame();
    loadFrames();
    connectWebSocket();
    setInterval(fetchLatestFrame, 60000);
  </script>
</body>
</html>
