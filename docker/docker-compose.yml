name: radrview

services:
  ingest-mrms:
    container_name: radrview-ingest-mrms
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: ["node", "dist/ingest/mrms.js"]
    volumes:
      - radrview-data:/data
    environment:
      - REDIS_URL=redis://redis:6379
      - DATA_DIR=/data
      - LOG_LEVEL=info
      - POLL_INTERVAL_MS=30000
      - MRMS_REGION=conus
    restart: unless-stopped
    depends_on:
      - redis

  ingest-mrms-alaska:
    container_name: radrview-ingest-alaska
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: ["node", "dist/ingest/mrms.js"]
    volumes:
      - radrview-data:/data
    environment:
      - REDIS_URL=redis://redis:6379
      - DATA_DIR=/data
      - LOG_LEVEL=info
      - MRMS_REGION=alaska
    restart: unless-stopped
    depends_on:
      - redis

  ingest-mrms-hawaii:
    container_name: radrview-ingest-hawaii
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: ["node", "dist/ingest/mrms.js"]
    volumes:
      - radrview-data:/data
    environment:
      - REDIS_URL=redis://redis:6379
      - DATA_DIR=/data
      - LOG_LEVEL=info
      - MRMS_REGION=hawaii
    restart: unless-stopped
    depends_on:
      - redis

  ingest-mrms-type:
    container_name: radrview-ingest-mrms-type
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: ["node", "dist/ingest/mrms.js"]
    volumes:
      - radrview-data:/data
    environment:
      - REDIS_URL=redis://redis:6379
      - DATA_DIR=/data
      - LOG_LEVEL=info
      - MRMS_REGION=conus
      - MRMS_PRODUCT=type
    restart: unless-stopped
    depends_on:
      - redis

  ingest-mrms-alaska-type:
    container_name: radrview-ingest-mrms-alaska-type
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: ["node", "dist/ingest/mrms.js"]
    volumes:
      - radrview-data:/data
    environment:
      - REDIS_URL=redis://redis:6379
      - DATA_DIR=/data
      - LOG_LEVEL=info
      - MRMS_REGION=alaska
      - MRMS_PRODUCT=type
    restart: unless-stopped
    depends_on:
      - redis

  ingest-mrms-hawaii-type:
    container_name: radrview-ingest-mrms-hawaii-type
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: ["node", "dist/ingest/mrms.js"]
    volumes:
      - radrview-data:/data
    environment:
      - REDIS_URL=redis://redis:6379
      - DATA_DIR=/data
      - LOG_LEVEL=info
      - MRMS_REGION=hawaii
      - MRMS_PRODUCT=type
    restart: unless-stopped
    depends_on:
      - redis

  tiler-1:
    container_name: radrview-tiler-1
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: ["node", "dist/pipeline/tiler.js"]
    volumes:
      - radrview-data:/data
    environment:
      - REDIS_URL=redis://redis:6379
      - DATA_DIR=/data
      - ZOOM_MIN=2
      - ZOOM_MAX=7
      - LOG_LEVEL=info
    restart: unless-stopped
    depends_on:
      - redis

  tiler-2:
    container_name: radrview-tiler-2
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: ["node", "dist/pipeline/tiler.js"]
    volumes:
      - radrview-data:/data
    environment:
      - REDIS_URL=redis://redis:6379
      - DATA_DIR=/data
      - ZOOM_MIN=2
      - ZOOM_MAX=7
      - LOG_LEVEL=info
    restart: unless-stopped
    depends_on:
      - redis

  server:
    container_name: radrview-server
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: ["node", "dist/server/index.js"]
    ports:
      - "8600:8600"
    volumes:
      - radrview-data:/data
    environment:
      - REDIS_URL=redis://redis:6379
      - DATA_DIR=/data
      - PORT=8600
      - LOG_LEVEL=info
      - NEXRAD_ENABLED=true
      - NEXRAD_STATIONS=all
      - NEXRAD_ZOOM_MIN=8
    restart: unless-stopped
    depends_on:
      - redis

  ingest-dwd:
    container_name: radrview-ingest-dwd
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: ["node", "dist/ingest/dwd.js"]
    volumes:
      - radrview-data:/data
    environment:
      - REDIS_URL=redis://redis:6379
      - DATA_DIR=/data
      - LOG_LEVEL=info
    restart: unless-stopped
    depends_on:
      - redis

  cleanup:
    container_name: radrview-cleanup
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: ["node", "dist/pipeline/cleanup.js"]
    volumes:
      - radrview-data:/data
    environment:
      - REDIS_URL=redis://redis:6379
      - DATA_DIR=/data
      - RETENTION_HOURS=24
      - LOG_LEVEL=info
    restart: unless-stopped
    depends_on:
      - redis

  ingest-canada:
    container_name: radrview-ingest-canada
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: ["node", "dist/ingest/ec.js"]
    volumes:
      - radrview-data:/data
    environment:
      - REDIS_URL=redis://redis:6379
      - DATA_DIR=/data
      - LOG_LEVEL=info
    restart: unless-stopped
    depends_on:
      - redis

  compositor:
    container_name: radrview-compositor
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: ["node", "dist/pipeline/compositor.js"]
    volumes:
      - radrview-data:/data
    environment:
      - REDIS_URL=redis://redis:6379
      - DATA_DIR=/data
      - ZOOM_MIN=2
      - ZOOM_MAX=7
      - LOG_LEVEL=info
    restart: unless-stopped
    depends_on:
      - redis

  redis:
    container_name: radrview-redis
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    restart: unless-stopped

volumes:
  radrview-data:
    driver: local
  redis-data:
    driver: local
